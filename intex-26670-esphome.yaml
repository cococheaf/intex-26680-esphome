substitutions:
  device_name: intex-26670-esphome
  friendly_name: Intex 26670 ESPHome

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: cococheaf.intex-26670-esphome
    version: "0.2.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

binary_sensor:
  - platform: status
    name: Status

  - platform: gpio
    name: Controller To Panel Line
    id: controller_to_panel_line
    entity_category: diagnostic
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true

  - platform: gpio
    name: Panel To Controller Line
    id: panel_to_controller_line
    entity_category: diagnostic
    pin:
      number: GPIO17
      mode:
        input: true
        pullup: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: WiFi Signal
    entity_category: diagnostic
    update_interval: 60s

  - platform: uptime
    name: Uptime
    entity_category: diagnostic
