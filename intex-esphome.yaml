# -------------------------------------------------------------------
# Intex ESPHome all-in-one firmware
#
# This YAML intentionally starts in passive/diagnostic mode. It exposes
# GPIO line states, model metadata and future button placeholders, but it
# does not inject button presses until the real TM1650 keycodes are mapped.
# -------------------------------------------------------------------

substitutions:
  # Supported target models: 26670, 26680.
  # This currently affects naming and diagnostic metadata only.
  target_model: "26680"

  # ESPHome node name and friendly display name shown in Home Assistant.
  device_name: intex-esphome
  friendly_name: "Intex ${target_model} ESPHome"

  # Four-line ESP32 bridge reference used for TM1650-style panels.
  # Confirm the real wiring before using these lines for active control.
  controller_clock_pin: GPIO19
  controller_data_pin: GPIO18
  panel_clock_pin: GPIO17
  panel_data_pin: GPIO16

  # Fill these after measuring the TM1650 keypad matrix.
  # Keep "unmapped" for buttons that do not exist on the selected model.
  keycode_power: "unmapped"
  keycode_pump: "unmapped"
  keycode_lock_unlock: "unmapped"
  keycode_chlorinator: "unmapped"
  keycode_timer: "unmapped"
  keycode_boost: "unmapped"
  keycode_self_clean: "unmapped"

  # Fill these after sniffing TM1650 display/status writes.
  # The values will likely be TM1650 display RAM address/bit combinations.
  # Keep "unmapped" until a known device state was captured and confirmed.
  status_pump_active: "unmapped"
  status_chlorinator_active: "unmapped"
  status_boost_active: "unmapped"
  status_sleep_active: "unmapped"
  status_low_flow: "unmapped"
  status_low_salt: "unmapped"
  status_high_salt: "unmapped"
  status_service: "unmapped"

  # Passive TM1650 frame logging. The component is loaded from this GitHub
  # repository through ESPHome external_components below.
  tm1650_sniffer_enabled: "true"
  tm1650_sniffer_log_raw: "true"

esphome:
  # Main ESPHome identity. `project` lets Home Assistant show a stable
  # project namespace/version for this firmware.
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: cococheaf.intex-esphome
    version: "0.3.0"

esp32:
  # Generic ESP32 DevKit target. Adjust this if the final PCB uses a
  # different ESP32 module/board definition.
  board: esp32dev
  framework:
    # ESP-IDF is preferred here for a conservative ESPHome baseline.
    type: esp-idf
    advanced:
      sram1_as_iram: true

# -------------------------------------------------------------------
# External Components
# -------------------------------------------------------------------
external_components:
  # Load the passive TM1650 sniffer from this repository. ESPHome will fetch
  # the component from GitHub during compile/update, so installed devices can
  # track the published repo instead of relying on local component files.
  - source:
      type: git
      url: https://github.com/cococheaf/intex-esphome
      ref: main
    components:
      - tm1650_sniffer
    refresh: 1h

# -------------------------------------------------------------------
# WiFi
# -------------------------------------------------------------------
wifi:
  # Main WiFi credentials are kept in the ignored local secrets.yaml.
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Connect directly to the configured network. `fast_connect` is useful when
  # the SSID is known and hidden-network scans are not needed.
  fast_connect: true

  # Static network configuration for the local installation.
  # Change these values when the device moves to another subnet.
  manual_ip:
    static_ip: 172.16.20.201
    gateway: 172.16.20.1
    subnet: 255.255.255.0
    dns1: 172.16.20.1

  # Fallback access point used when the device cannot join WiFi.
  # Credentials are secrets so they can differ per installation.
  ap:
    ssid: !secret fallback_ssid
    password: !secret fallback_password

# Allows local WiFi provisioning through the fallback AP.
captive_portal:

# -------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------
logger:
  # INFO keeps normal logs readable. Increase to DEBUG only while capturing
  # protocol behavior or debugging ESPHome startup.
  level: INFO

# -------------------------------------------------------------------
# Home Assistant API
# -------------------------------------------------------------------
api:
  # Encrypted native API connection for Home Assistant.
  encryption:
    key: !secret api_encryption_key

  # Explicit API id/port. Reboot timeout is disabled so the device keeps
  # running diagnostics even if Home Assistant is offline.
  id: espapiwm
  port: 6053
  reboot_timeout: 0s

# -------------------------------------------------------------------
# Local Web Server
# -------------------------------------------------------------------
web_server:
  # Local web UI for diagnostics and optional browser-based OTA uploads.
  port: 80
  version: 2
  local: true

# -------------------------------------------------------------------
# OTA Updates
# -------------------------------------------------------------------
ota:
  # Standard ESPHome OTA, protected by a local secret.
  - platform: esphome
    password: !secret ota_password

  # Enables firmware uploads through the local web server.
  - platform: web_server

# -------------------------------------------------------------------
# Time
# -------------------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
      - 0.at.pool.ntp.org
      - 0.pool.ntp.org
      - 1.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "Synchronized SNTP clock"

# -------------------------------------------------------------------
# Passive TM1650 Sniffer
# -------------------------------------------------------------------
tm1650_sniffer:
  # Log-only passive decoder. It observes SCL/SDA and prints raw frames.
  # Keep the connected ESP32 pins input-only and protect them from 5 V levels.
  enabled: ${tm1650_sniffer_enabled}
  log_raw: ${tm1650_sniffer_log_raw}
  scl_pin:
    number: ${controller_clock_pin}
    mode:
      input: true
      pullup: true
  sda_pin:
    number: ${controller_data_pin}
    mode:
      input: true
      pullup: true

# -------------------------------------------------------------------
# Binary Sensors
# -------------------------------------------------------------------
binary_sensor:
  # ESPHome node connectivity status.
  - platform: status
    name: Status

  # The controller-side TM1650 SCL/SDA pins are owned by the tm1650_sniffer
  # component above. Keeping them out of gpio binary_sensor avoids duplicate
  # pin ownership and interrupt conflicts.

  # Candidate clock line on the panel/display side of the bridge.
  - platform: gpio
    name: Panel Clock Candidate
    id: panel_clock_candidate
    entity_category: diagnostic
    pin:
      number: ${panel_clock_pin}
      mode:
        input: true
        pullup: true

  # Candidate data line on the panel/display side of the bridge.
  - platform: gpio
    name: Panel Data Candidate
    id: panel_data_candidate
    entity_category: diagnostic
    pin:
      number: ${panel_data_pin}
      mode:
        input: true
        pullup: true

  # Status placeholders for later TM1650 display/LED decoding.
  # They stay disabled and always false until the sniffer publishes decoded
  # status bits. This keeps the first firmware safe and honest.
  - platform: template
    name: Pump Active
    id: pump_active
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

  - platform: template
    name: Chlorinator Active
    id: chlorinator_active
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

  - platform: template
    name: Boost Active
    id: boost_active
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

  - platform: template
    name: Sleep Active
    id: sleep_active
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

  - platform: template
    name: Pump Low Flow
    id: pump_low_flow
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

  - platform: template
    name: Low Salt
    id: low_salt
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

  - platform: template
    name: High Salt
    id: high_salt
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

  - platform: template
    name: Service
    id: service_state
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return false;

# -------------------------------------------------------------------
# Text Sensors
# -------------------------------------------------------------------
text_sensor:
  # Shows which model this firmware instance is configured for.
  - platform: template
    name: Target Model
    entity_category: diagnostic
    lambda: |-
      return std::string("${target_model}");

  # Diagnostic echo of the currently configured keycode placeholders.
  - platform: template
    name: Power Keycode
    entity_category: diagnostic
    lambda: |-
      return std::string("${keycode_power}");

  - platform: template
    name: Pump Keycode
    entity_category: diagnostic
    lambda: |-
      return std::string("${keycode_pump}");

  - platform: template
    name: Lock Unlock Keycode
    entity_category: diagnostic
    lambda: |-
      return std::string("${keycode_lock_unlock}");

  - platform: template
    name: Chlorinator Keycode
    entity_category: diagnostic
    lambda: |-
      return std::string("${keycode_chlorinator}");

  - platform: template
    name: Timer Keycode
    entity_category: diagnostic
    lambda: |-
      return std::string("${keycode_timer}");

  - platform: template
    name: Boost Keycode
    entity_category: diagnostic
    lambda: |-
      return std::string("${keycode_boost}");

  - platform: template
    name: Self Clean Keycode
    entity_category: diagnostic
    lambda: |-
      return std::string("${keycode_self_clean}");

  # Diagnostic echo of the status mappings that still need to be discovered.
  - platform: template
    name: Pump Active Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_pump_active}");

  - platform: template
    name: Chlorinator Active Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_chlorinator_active}");

  - platform: template
    name: Boost Active Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_boost_active}");

  - platform: template
    name: Sleep Active Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_sleep_active}");

  - platform: template
    name: Pump Low Flow Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_low_flow}");

  - platform: template
    name: Low Salt Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_low_salt}");

  - platform: template
    name: High Salt Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_high_salt}");

  - platform: template
    name: Service Mapping
    entity_category: diagnostic
    lambda: |-
      return std::string("${status_service}");

  # Future sniffer output placeholder. A local TM1650 sniffer component can
  # publish the most recent decoded display write here once implemented.
  - platform: template
    name: TM1650 Last Status Frame
    id: tm1650_last_status_frame
    entity_category: diagnostic
    disabled_by_default: true
    lambda: |-
      return std::string("sniffer-not-enabled");

  # IP address exposed as a diagnostic entity.
  - platform: wifi_info
    ip_address:
      name: IP Address
      entity_category: diagnostic

# -------------------------------------------------------------------
# Buttons
# -------------------------------------------------------------------
button:
  # Local restart command for maintenance.
  - platform: restart
    name: Restart
    entity_category: diagnostic

  # Virtual buttons are intentionally disabled. They become useful only after
  # TM1650 keycodes are measured and active injection logic is implemented.
  - platform: template
    name: Virtual Power
    disabled_by_default: true
    on_press:
      - logger.log: "Virtual Power is not active until the keycode mapping is implemented."

  - platform: template
    name: Virtual Pump
    disabled_by_default: true
    on_press:
      - logger.log: "Virtual Pump is not active until the keycode mapping is implemented."

  - platform: template
    name: Virtual Lock Unlock
    disabled_by_default: true
    on_press:
      - logger.log: "Virtual Lock Unlock is not active until the keycode mapping is implemented."

  - platform: template
    name: Virtual Chlorinator
    disabled_by_default: true
    on_press:
      - logger.log: "Virtual Chlorinator is not active until the keycode mapping is implemented."

  - platform: template
    name: Virtual Timer
    disabled_by_default: true
    on_press:
      - logger.log: "Virtual Timer is not active until the keycode mapping is implemented."

  - platform: template
    name: Virtual Boost
    disabled_by_default: true
    on_press:
      - logger.log: "Virtual Boost is not active until the keycode mapping is implemented."

  - platform: template
    name: Virtual Self Clean
    disabled_by_default: true
    on_press:
      - logger.log: "Virtual Self Clean is not active until the keycode mapping is implemented."

# -------------------------------------------------------------------
# Numeric Sensors
# -------------------------------------------------------------------
sensor:
  # WiFi RSSI and uptime are useful while tuning enclosure placement and OTA
  # reliability around pool equipment.
  - platform: wifi_signal
    name: WiFi Signal
    entity_category: diagnostic
    update_interval: 60s

  - platform: uptime
    name: Uptime
    entity_category: diagnostic
